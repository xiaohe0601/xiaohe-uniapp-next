ignoreWorkspaceRootCheck: true
minimumReleaseAge: 0
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - "@vitejs/plugin-legacy@5.3.2"
  - chokidar@4.0.3
  - semver@6.3.1
  - vite@5.4.21

allowBuilds:
  "@uni-helper/unocss-preset-uni": true
  core-js: false
  core-js-pure: false
  esbuild: true
  vue-demi: true