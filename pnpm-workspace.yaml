ignoreWorkspaceRootCheck: true
minimumReleaseAge: 0
shamefullyHoist: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - "@uni-helper/vite-plugin-uni-manifest@0.3.0"
  - "@vitejs/plugin-legacy@5.3.2"
  - chokidar@4.0.3
  - semver@6.3.1
  - tinyexec@1.2.2
  - vite@5.4.21

allowBuilds:
  "@uni-helper/unocss-preset-uni": true
  core-js: false
  esbuild: true
  vue-demi: true